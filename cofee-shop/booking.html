<body>
    <header>
        <div class="container header-container">
            <a href="index.html" class="logo">КОФЕЙНАЯ <span>СМЕСЬ</span></a>
            <nav class="nav">
                <button class="nav-toggle">☰</button>

                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h1>Бронирование столика</h1>
            <div class="booking-form-container">
                <form id="booking-form">
                    <div class="form-group"><label for="booking-name">Имя *</label><input type="text" id="booking-name" required></div>
                    <div class="form-group"><label for="booking-phone">Телефон *</label><input type="tel" id="booking-phone" placeholder="+7 (XXX) XXX-XX-XX" required></div>
                    <div class="form-group"><label for="booking-date">Дата *</label><input type="date" id="booking-date" required></div>
                    <div class="form-group"><label for="booking-time">Время *</label><select id="booking-time" required><option value="">Выберите время</option><option value="09:00">09:00</option><option value="10:00">10:00</option><option value="11:00">11:00</option><option value="12:00">12:00</option><option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option><option value="17:00">17:00</option><option value="18:00">18:00</option><option value="19:00">19:00</option><option value="20:00">20:00</option></select></div>
                    <div class="form-group"><label for="booking-guests">Количество гостей *</label><input type="number" id="booking-guests" min="1" max="20" required></div>
                    <div class="form-group"><label for="booking-comment">Комментарий</label><textarea id="booking-comment" rows="3"></textarea></div>
                    <button type="submit" class="btn btn-primary">Забронировать</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-col"><h4>Кофейная смесь</h4><p>ул. Пушкина, 10<br>Ежедневно 8:00–22:00</p></div>
                <div class="footer-col"><h4>Контакты</h4><p>+7 (978) 123-45-67<br>info@coffeesmearf.ru</p></div>
                <div class="footer-col"><h4>Мы в соцсетях</h4><div class="social-links"><a href="#">Instagram</a> | <a href="#">Telegram</a> | <a href="#">VK</a></div></div>
            </div>

        </div>
    </footer>
